<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Chispa y El Silicio | Ecosistema Blindado</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #8d8d8d;
            --accent-color: #ffb703;
            --golden-ratio: 1.618;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .overlay {
            position: relative;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            padding: calc(20px * var(--golden-ratio));
            border: 1px solid #333;
            background: rgba(10, 10, 10, 0.85);
            box-shadow: 0 0 25px rgba(255, 183, 3, 0.15);
        }
        h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-top: 0;
        }
        p {
            color: var(--text-muted);
            line-height: var(--golden-ratio);
            font-size: 1.1em;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>La Chispa y El Silicio</h1>
        <p>[ ESTADO: ACTIVO Y SOBERANO ]<br>Aquí termina el ruido. Geometría, código y precisión.</p>
    </div>
    <canvas id="spiralCanvas"></canvas>

    <script>
        const canvas = document.getElementById('spiralCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawSpiral() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#ffb703';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            
            let angle = 0;
            let radius = 0;

            for (let i = 0; i < 600; i++) {
                angle += 0.1;
                radius += 0.45;
                const x = canvas.width / 2 + Math.cos(angle) * radius;
                const y = canvas.height / 2 + Math.sin(angle) * radius;
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        drawSpiral();
    </script>
</body>
</html>
